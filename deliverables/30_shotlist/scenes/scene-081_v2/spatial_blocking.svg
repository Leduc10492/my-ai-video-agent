15 150" class="axis"/><text x="690" y="135" class="label">上坡出口</text><circle cx="145" cy="520" r="22" class="camera"/><text x="130" y="526" class="label">C1</text><circle cx="445" cy="515" r="22" class="camera"/><text x="430" y="521" class="label">C2</text><circle cx="470" cy="455" r="22" class="camera"/><text x="455" y="461" class="label">C3</text><circle cx="650" cy="455" r="22" class="camera"/><text x="635" y="461" class="label">C4</text><circle cx="200" cy="560" r="22" class="camera"/><text x="185" y="566" class="label">C5</text><path d="M155 500 L600 365" class="axis"/><path d="M445 493 L420 420" class="axis"/><path d="M470 433 L620 365" class="axis"/><path d="M650 433 L642 380" class="axis"/><path d="M210 540 L590 380" class="axis"/><rect x="70" y="590" width="760" height="90" rx="12" fill="#161619" stroke="#3f3f46"/><text x="90" y="620" class="small">C1=P455 WS 35mm　C2=P455 MS 50mm　C3=P456 CU 100mm　C4=P456 ECU 85mm　C5=P456 MS 50mm</text><text x="90" y="648" class="small">关键边界：P455禁看天/放行；P456止于车头刚越线，禁完整远离、尾灯收束、车流跟随。</text></svg>